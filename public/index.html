<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pokémon Illustration Rares</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f;
    --surface: rgba(255,255,255,0.03);
    --border: rgba(255,255,255,0.07);
    --gold: rgba(255,200,80,0.88);
    --gold-dim: rgba(255,200,80,0.22);
    --text: #e8e0d0;
    --text-dim: rgba(232,224,208,0.38);
    --text-faint: rgba(232,224,208,0.2);
    --green: rgba(100,220,150,0.85);
    --red: rgba(255,80,80,0.7);
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: Georgia, serif;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(255,180,50,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(100,180,255,0.05) 0%, transparent 50%);
  }

  /* ── Layout ── */
  #app { position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 0 22px 80px; }

  header {
    padding: 40px 0 24px;
    border-bottom: 1px solid rgba(255,200,80,0.11);
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 14px;
  }
  .header-left h1 { font-size: clamp(20px, 3.5vw, 42px); font-weight: 400; letter-spacing: -0.02em; color: #f5e6c0; }
  .header-left p { margin-top: 7px; font-size: 13px; color: var(--text-dim); }
  .header-badge { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,200,80,0.5); font-family: monospace; margin-left: 12px; }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 7px; }
  .tab {
    background: transparent; border: 1px solid var(--border); color: var(--text-dim);
    padding: 7px 17px; border-radius: 8px; font-size: 13px; cursor: pointer; transition: all 0.15s;
    font-family: Georgia, serif;
  }
  .tab.active { background: rgba(255,200,80,0.1); border-color: rgba(255,200,80,0.3); color: var(--gold); }
  .tab-badge { background: rgba(255,200,80,0.22); border-radius: 10px; padding: 1px 6px; font-size: 10px; margin-left: 5px; }

  /* ── Controls ── */
  .controls { padding: 22px 0 18px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .controls label { font-size: 11px; color: var(--text-dim); letter-spacing: 0.12em; text-transform: uppercase; }
  select {
    background: rgba(255,255,255,0.04); border: 1px solid var(--gold-dim); color: var(--text);
    padding: 7px 13px; border-radius: 7px; font-size: 13px; cursor: pointer; outline: none; min-width: 200px;
    font-family: Georgia, serif;
  }
  select option { background: #1a1a24; }
  .count { font-size: 11px; color: rgba(255,200,80,0.38); margin-left: auto; }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(168px, 1fr));
    gap: 14px;
  }

  /* ── Card tile ── */
  .card-tile {
    border-radius: 10px; overflow: hidden; cursor: pointer; position: relative;
    border: 1px solid var(--border); background: var(--surface);
    transition: all 0.2s;
    animation: rise 0.22s ease both;
  }
  .card-tile:hover {
    border-color: rgba(255,200,80,0.35);
    transform: translateY(-4px) scale(1.02);
    box-shadow: 0 12px 36px rgba(0,0,0,0.5);
  }
  .card-tile img { width: 100%; display: block; }
  .card-info { padding: 8px 10px 10px; }
  .card-name { font-size: 12px; font-weight: 600; color: #f5e6c0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-meta { font-size: 10px; color: var(--text-faint); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-price { font-size: 12px; color: var(--gold); margin-top: 4px; font-weight: 500; }
  .card-price.no-price { color: var(--text-faint); }

  .fav-btn {
    position: absolute; top: 6px; right: 6px; z-index: 2;
    width: 27px; height: 27px; border-radius: 50%; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; transition: transform 0.15s;
    background: rgba(0,0,0,0.55); backdrop-filter: blur(4px);
    color: rgba(255,200,80,0.75);
  }
  .fav-btn.active { background: rgba(255,200,80,0.92); color: #0a0a0f; box-shadow: 0 2px 8px rgba(255,200,80,0.35); }
  .fav-btn:hover { transform: scale(1.2); }

  .no-img { aspect-ratio: 2.5/3.5; background: rgba(255,255,255,0.04); display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--text-faint); }

  /* ── Pagination ── */
  .pagination { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 44px; }
  .pag-btn {
    background: rgba(255,200,80,0.07); border: 1px solid rgba(255,200,80,0.17);
    color: rgba(255,200,80,0.72); padding: 7px 15px; border-radius: 7px; font-size: 12px;
    cursor: pointer; font-family: Georgia, serif;
  }
  .pag-btn:disabled { background: rgba(255,255,255,0.02); color: var(--text-faint); cursor: default; }
  .pag-info { font-size: 12px; color: var(--text-faint); }

  /* ── Empty / error / loading ── */
  .empty { text-align: center; padding: 80px 0; color: var(--text-faint); font-size: 14px; }
  .error-box { padding: 13px 17px; background: rgba(255,80,80,0.07); border: 1px solid rgba(255,80,80,0.2); border-radius: 8px; margin-bottom: 18px; font-size: 13px; color: rgba(255,120,120,0.8); }
  .spinner { display: flex; justify-content: center; padding: 70px 0; }
  .spinner-ring { width: 34px; height: 34px; border: 2px solid rgba(255,200,80,0.1); border-top-color: rgba(255,200,80,0.65); border-radius: 50%; animation: spin 0.8s linear infinite; }

  /* ── Wishlist ── */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap: 9px; margin-top: 26px; margin-bottom: 26px; }
  .stat-card { padding: 13px 15px; border-radius: 9px; border: 1px solid var(--border); background: var(--surface); }
  .stat-label { font-size: 9px; color: var(--text-faint); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
  .stat-value { font-size: 19px; font-weight: 500; color: var(--gold); }
  .stat-value.green { color: var(--green); }
  .stat-sub { font-size: 9px; color: var(--text-faint); margin-top: 3px; }

  .progress-label { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-faint); margin-bottom: 5px; }
  .progress-bar { height: 3px; background: rgba(255,255,255,0.05); border-radius: 3px; margin-bottom: 22px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; background: rgba(100,220,150,0.55); transition: width 0.4s; }

  .wish-list { display: flex; flex-direction: column; gap: 7px; }
  .wish-row {
    display: flex; align-items: center; gap: 11px; padding: 8px 11px; border-radius: 8px;
    border: 1px solid var(--border); transition: all 0.15s;
  }
  .wish-row:hover { background: rgba(255,255,255,0.02); }
  .wish-row.collected { border-color: rgba(100,220,150,0.16); background: rgba(100,220,150,0.03); opacity: 0.58; }

  .check-btn {
    width: 20px; height: 20px; border-radius: 5px; flex-shrink: 0;
    border: 1.5px solid rgba(255,255,255,0.16); background: transparent;
    color: transparent; cursor: pointer; font-size: 11px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .check-btn.checked { border-color: rgba(100,220,150,0.6); background: rgba(100,220,150,0.18); color: rgba(100,220,150,0.9); }

  .wish-thumb { width: 40px; border-radius: 4px; cursor: pointer; flex-shrink: 0; }
  .wish-info { flex: 1; min-width: 0; cursor: pointer; }
  .wish-name { font-size: 13px; color: #f5e6c0; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .wish-row.collected .wish-name { text-decoration: line-through; }
  .wish-meta { font-size: 10px; color: var(--text-faint); margin-top: 2px; }
  .wish-price { flex-shrink: 0; text-align: right; font-size: 14px; color: var(--gold); font-weight: 500; }
  .wish-price.no-price { color: var(--text-faint); }
  .wish-price-sub { font-size: 9px; color: var(--text-faint); margin-top: 1px; }
  .remove-btn { background: transparent; border: none; color: var(--red); cursor: pointer; font-size: 16px; padding: 2px 4px; opacity: 0; transition: opacity 0.15s; }
  .wish-row:hover .remove-btn { opacity: 1; }

  .wish-note { margin-top: 26px; font-size: 10px; color: var(--text-faint); text-align: center; }
  .wish-empty { text-align: center; padding: 90px 0; }
  .wish-empty-icon { font-size: 44px; opacity: 0.2; margin-bottom: 10px; }
  .wish-empty p { font-size: 14px; color: var(--text-faint); }
  .wish-empty small { font-size: 11px; color: rgba(232,224,208,0.16); }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.88);
    display: flex; align-items: center; justify-content: center;
    padding: 22px; backdrop-filter: blur(8px);
  }
  .modal-box {
    background: #13131a; border: 1px solid rgba(255,200,80,0.14); border-radius: 15px;
    max-width: 700px; width: 100%; display: flex; gap: 24px; padding: 24px; flex-wrap: wrap;
    box-shadow: 0 32px 100px rgba(0,0,0,0.85); max-height: 90vh; overflow-y: auto;
  }
  .modal-img { width: 200px; border-radius: 10px; flex-shrink: 0; align-self: flex-start; }
  .modal-content { flex: 1; min-width: 180px; }
  .modal-header { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; margin-bottom: 16px; }
  .modal-title { font-size: 20px; font-weight: 400; color: #f5e6c0; }
  .modal-sub { font-size: 11px; color: rgba(255,200,80,0.48); margin-top: 3px; }
  .modal-fav-btn {
    background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    color: var(--text-dim); border-radius: 7px; padding: 5px 12px;
    cursor: pointer; font-size: 12px; flex-shrink: 0; white-space: nowrap;
    font-family: Georgia, serif; transition: all 0.15s;
  }
  .modal-fav-btn.active { background: rgba(255,200,80,0.1); border-color: rgba(255,200,80,0.32); color: var(--gold); }

  .info-row { display: flex; gap: 10px; margin-bottom: 6px; font-size: 12px; }
  .info-label { color: var(--text-faint); width: 72px; flex-shrink: 0; }
  .info-value { color: rgba(232,224,208,0.7); }

  .price-box { margin-top: 16px; padding: 13px; background: rgba(255,200,80,0.04); border-radius: 9px; border: 1px solid rgba(255,200,80,0.1); }
  .price-box-title { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,200,80,0.42); margin-bottom: 10px; }
  .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
  .price-stat { padding: 6px 8px; border-radius: 6px; background: rgba(255,255,255,0.03); }
  .price-stat.hi { background: rgba(255,200,80,0.07); }
  .price-stat-label { font-size: 9px; color: var(--text-faint); margin-bottom: 3px; }
  .price-stat-value { font-size: 13px; color: rgba(232,224,208,0.65); }
  .price-stat.hi .price-stat-value { color: var(--gold); font-weight: 600; }
  .price-note { margin-top: 8px; font-size: 9px; color: rgba(232,224,208,0.16); }
  .no-price-msg { font-size: 12px; color: var(--text-faint); }

  .attacks { margin-top: 14px; }
  .attacks-title { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 6px; }
  .attack { margin-bottom: 6px; font-size: 12px; }
  .attack-name { color: #f5e6c0; font-weight: 600; }
  .attack-dmg { margin-left: 6px; color: rgba(255,200,80,0.6); }
  .attack-text { margin-top: 2px; font-size: 11px; color: rgba(232,224,208,0.33); }

  .modal-actions { margin-top: 20px; display: flex; gap: 9px; }
  .close-btn {
    background: transparent; border: 1px solid rgba(255,200,80,0.2);
    color: rgba(255,200,80,0.6); padding: 7px 18px; border-radius: 7px;
    font-size: 13px; cursor: pointer; font-family: Georgia, serif;
  }
  .cm-link {
    background: rgba(30,140,255,0.1); border: 1px solid rgba(30,140,255,0.22);
    color: rgba(100,180,255,0.75); padding: 7px 14px; border-radius: 7px;
    font-size: 13px; text-decoration: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-left">
      <h1>Illustration Rares <span class="header-badge">Pokémon TCG</span></h1>
      <p>Blader, bewaar favorieten en beheer je wishlist</p>
    </div>
    <div class="tabs">
      <button class="tab active" id="tab-browse" onclick="switchView('browse')">Bladeren</button>
      <button class="tab" id="tab-wishlist" onclick="switchView('wishlist')">♡ Wishlist <span class="tab-badge" id="fav-count" style="display:none">0</span></button>
    </div>
  </header>

  <div id="view-browse">
    <div class="controls">
      <label>Set</label>
      <select id="set-select" onchange="onSetChange()">
        <option value="all">Alle sets</option>
        <option value="sv8pt5">Prismatic Evolutions</option>
        <option value="sv8">Surging Sparks</option>
        <option value="sv7">Stellar Crown</option>
        <option value="sv6pt5">Shrouded Fable</option>
        <option value="sv6">Twilight Masquerade</option>
        <option value="sv5">Temporal Forces</option>
        <option value="sv4pt5">Paldean Fates</option>
        <option value="sv4">Paradox Rift</option>
        <option value="sv3pt5">151</option>
        <option value="sv3">Obsidian Flames</option>
        <option value="sv2">Paldea Evolved</option>
        <option value="sv1">Scarlet &amp; Violet</option>
        <option value="swsh12pt5">Crown Zenith</option>
        <option value="swsh12">Silver Tempest</option>
        <option value="swsh11">Lost Origin</option>
      </select>
      <span class="count" id="card-count"></span>
    </div>
    <div id="error-box" class="error-box" style="display:none"></div>
    <div id="spinner" class="spinner" style="display:none"><div class="spinner-ring"></div></div>
    <div id="card-grid" class="grid"></div>
    <div id="empty-msg" class="empty" style="display:none">Geen kaarten gevonden</div>
    <div class="pagination" id="pagination" style="display:none">
      <button class="pag-btn" id="btn-prev" onclick="changePage(-1)">← Vorige</button>
      <span class="pag-info" id="page-info"></span>
      <button class="pag-btn" id="btn-next" onclick="changePage(1)">Volgende →</button>
    </div>
  </div>

  <div id="view-wishlist" style="display:none"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" style="display:none" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <img class="modal-img" id="modal-img" src="" alt="" style="display:none" />
    <div class="modal-content">
      <div class="modal-header">
        <div>
          <div class="modal-title" id="modal-name"></div>
          <div class="modal-sub" id="modal-sub"></div>
        </div>
        <button class="modal-fav-btn" id="modal-fav-btn" onclick="toggleModalFav()">♡ Wishlist</button>
      </div>
      <div id="modal-info"></div>
      <div class="price-box">
        <div class="price-box-title">Marktprijs (Cardmarket)</div>
        <div id="modal-prices"><div class="no-price-msg" style="color:rgba(232,224,208,0.3)">Laden…</div></div>
        <div class="price-note">Actueel bij laden · via Pokémon TCG API</div>
      </div>
      <div id="modal-attacks"></div>
      <div class="modal-actions">
        <button class="close-btn" onclick="closeModal()">Sluiten</button>
        <a id="modal-cm-link" class="cm-link" href="#" target="_blank" style="display:none">↗ Cardmarket</a>
      </div>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────
let state = {
  cards: [], page: 1, totalPages: 1, totalCount: 0,
  selectedSet: 'all', loading: false,
  favorites: {}, collected: {},
  modalCard: null
};

// ── Init ──────────────────────────────────────────────────────────
async function init() {
  await loadUserData();
  updateFavBadge();
  fetchCards();
}

// ── User data (persisted on server) ──────────────────────────────
async function loadUserData() {
  try {
    const r = await fetch('/api/userdata');
    const d = await r.json();
    state.favorites = d.favorites || {};
    state.collected = d.collected || {};
  } catch {}
}

async function saveUserData() {
  try {
    await fetch('/api/userdata', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ favorites: state.favorites, collected: state.collected })
    });
  } catch {}
}

// ── Fetch cards ───────────────────────────────────────────────────
async function fetchCards() {
  if (state.loading) return;
  state.loading = true;
  setLoading(true);
  clearError();

  try {
    const url = `/api/cards?set=${state.selectedSet}&page=${state.page}&pageSize=20`;
    const r = await fetch(url);
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    state.cards = data.data || [];
    state.totalCount = data.totalCount || 0;
    state.totalPages = Math.max(1, Math.ceil(state.totalCount / 20));
    renderGrid();
    renderPagination();
  } catch(e) {
    showError('Fout bij laden: ' + e.message);
  } finally {
    state.loading = false;
    setLoading(false);
  }
}

// ── Render grid ───────────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('card-grid');
  const empty = document.getElementById('empty-msg');
  const count = document.getElementById('card-count');

  count.textContent = state.totalCount > 0 ? `${state.totalCount} kaarten` : '';

  if (state.cards.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = state.cards.map((card, i) => {
    const img = card.images?.small || '';
    const isFav = !!state.favorites[card.id];
    const price = getPrice(card);
    const setName = card.set?.name || '';
    return `
      <div class="card-tile" style="animation-delay:${i*22}ms" onclick="openModal('${card.id}')">
        <button class="fav-btn ${isFav ? 'active' : ''}" onclick="event.stopPropagation(); toggleFav('${card.id}')" title="${isFav ? 'Verwijder uit wishlist' : 'Voeg toe aan wishlist'}">
          ${isFav ? '♥' : '♡'}
        </button>
        ${img ? `<img src="${img}" alt="${esc(card.name)}" loading="lazy" />` : `<div class="no-img">Geen afbeelding</div>`}
        <div class="card-info">
          <div class="card-name">${esc(card.name)}</div>
          <div class="card-meta">${esc(setName)} · #${esc(card.number)}</div>
          <div class="card-price ${price == null ? 'no-price' : ''}">${fmtPrice(price)}${price != null ? ' <small style="font-size:9px;opacity:0.4">30d</small>' : ''}</div>
        </div>
      </div>`;
  }).join('');
}

// ── Pagination ────────────────────────────────────────────────────
function renderPagination() {
  const pag = document.getElementById('pagination');
  const info = document.getElementById('page-info');
  const prev = document.getElementById('btn-prev');
  const next = document.getElementById('btn-next');

  if (state.totalPages <= 1) { pag.style.display = 'none'; return; }
  pag.style.display = 'flex';
  info.textContent = `${state.page} / ${state.totalPages}`;
  prev.disabled = state.page === 1;
  next.disabled = state.page === state.totalPages;
}

function changePage(dir) {
  const np = state.page + dir;
  if (np < 1 || np > state.totalPages) return;
  state.page = np;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  fetchCards();
}

// ── Set filter ────────────────────────────────────────────────────
function onSetChange() {
  state.selectedSet = document.getElementById('set-select').value;
  state.page = 1;
  fetchCards();
}

// ── Favorites ─────────────────────────────────────────────────────
function toggleFav(cardId) {
  const card = state.cards.find(c => c.id === cardId) || state.favorites[cardId];
  if (!card) return;
  if (state.favorites[cardId]) delete state.favorites[cardId];
  else state.favorites[cardId] = card;
  saveUserData();
  updateFavBadge();
  renderGrid();
  if (state.modalCard?.id === cardId) updateModalFavBtn();
}

function toggleModalFav() {
  if (!state.modalCard) return;
  toggleFav(state.modalCard.id);
}

function updateFavBadge() {
  const count = Object.keys(state.favorites).length;
  const badge = document.getElementById('fav-count');
  badge.textContent = count;
  badge.style.display = count > 0 ? 'inline' : 'none';
}

function updateModalFavBtn() {
  const btn = document.getElementById('modal-fav-btn');
  const isFav = !!state.favorites[state.modalCard?.id];
  btn.textContent = isFav ? '♥ In wishlist' : '♡ Wishlist';
  btn.className = 'modal-fav-btn' + (isFav ? ' active' : '');
}

// ── Modal ─────────────────────────────────────────────────────────
async function openModal(cardId) {
  const card = state.cards.find(c => c.id === cardId) || state.favorites[cardId];
  if (!card) return;
  state.modalCard = card;

  const modal = document.getElementById('modal');
  modal.style.display = 'flex';

  // Set basic info immediately
  document.getElementById('modal-name').textContent = card.name;
  document.getElementById('modal-sub').textContent = `${card.set?.name || ''} · #${card.number} · ${card.rarity || ''}`;
  updateModalFavBtn();

  const imgEl = document.getElementById('modal-img');
  if (card.images?.large) { imgEl.src = card.images.large; imgEl.style.display = 'block'; }
  else if (card.images?.small) { imgEl.src = card.images.small; imgEl.style.display = 'block'; }
  else imgEl.style.display = 'none';

  document.getElementById('modal-info').innerHTML = [
    card.artist ? infoRow('Illustrator', card.artist) : '',
    card.subtypes?.length ? infoRow('Subtype', card.subtypes.join(', ')) : '',
    card.types?.length ? infoRow('Type', card.types.join(', ')) : '',
    card.hp ? infoRow('HP', card.hp) : '',
  ].join('');

  document.getElementById('modal-prices').innerHTML = '<div class="no-price-msg">Laden…</div>';
  document.getElementById('modal-attacks').innerHTML = '';

  const cmLink = document.getElementById('modal-cm-link');
  cmLink.style.display = 'none';

  // Fetch full card detail
  try {
    const r = await fetch(`/api/cards/${cardId}`);
    const d = await r.json();
    const full = d.data || card;
    state.modalCard = full;
    updateModalFavBtn();

    // Prices
    const cm = full.cardmarket?.prices;
    const tcg = full.tcgplayer?.prices;
    let priceHtml = '';

    if (cm) {
      priceHtml = `<div class="price-grid">
        ${cm.avg30 != null ? `<div class="price-stat hi"><div class="price-stat-label">30-daags gemiddelde</div><div class="price-stat-value">${fmtPrice(cm.avg30)}</div></div>` : ''}
        ${cm.trendPrice != null ? `<div class="price-stat"><div class="price-stat-label">Trendprijs</div><div class="price-stat-value">${fmtPrice(cm.trendPrice)}</div></div>` : ''}
        ${cm.averageSellPrice != null ? `<div class="price-stat"><div class="price-stat-label">Gem. verkoop</div><div class="price-stat-value">${fmtPrice(cm.averageSellPrice)}</div></div>` : ''}
        ${cm.lowPrice != null ? `<div class="price-stat"><div class="price-stat-label">Laagste</div><div class="price-stat-value">${fmtPrice(cm.lowPrice)}</div></div>` : ''}
      </div>`;
      if (full.cardmarket?.url) {
        cmLink.href = full.cardmarket.url;
        cmLink.style.display = 'inline';
      }
    } else if (tcg) {
      const v = tcg.holofoil || tcg.normal || Object.values(tcg)[0];
      priceHtml = v?.market != null
        ? `<div class="price-grid"><div class="price-stat hi"><div class="price-stat-label">Marktprijs (TCGPlayer)</div><div class="price-stat-value">${fmtPrice(v.market)}</div></div></div>`
        : `<div class="no-price-msg">Geen prijsdata</div>`;
    } else {
      priceHtml = '<div class="no-price-msg">Geen prijsdata beschikbaar</div>';
    }
    document.getElementById('modal-prices').innerHTML = priceHtml;

    // Attacks
    if (full.attacks?.length) {
      document.getElementById('modal-attacks').innerHTML = `
        <div class="attacks">
          <div class="attacks-title">Aanvallen</div>
          ${full.attacks.map(a => `
            <div class="attack">
              <span class="attack-name">${esc(a.name)}</span>
              ${a.damage ? `<span class="attack-dmg">${esc(a.damage)}</span>` : ''}
              ${a.text ? `<div class="attack-text">${esc(a.text)}</div>` : ''}
            </div>`).join('')}
        </div>`;
    }

    // Update illustrator if richer data
    document.getElementById('modal-info').innerHTML = [
      full.artist ? infoRow('Illustrator', full.artist) : '',
      full.subtypes?.length ? infoRow('Subtype', full.subtypes.join(', ')) : '',
      full.types?.length ? infoRow('Type', full.types.join(', ')) : '',
      full.hp ? infoRow('HP', full.hp) : '',
    ].join('');

  } catch(e) {
    document.getElementById('modal-prices').innerHTML = '<div class="no-price-msg">Kon details niet laden</div>';
  }
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
  state.modalCard = null;
}

// ── Wishlist view ─────────────────────────────────────────────────
function renderWishlist() {
  const view = document.getElementById('view-wishlist');
  const favList = Object.values(state.favorites);

  if (favList.length === 0) {
    view.innerHTML = `
      <div class="wish-empty">
        <div class="wish-empty-icon">♡</div>
        <p>Nog geen favorieten</p>
        <small>Klik ♡ op een kaart om hem toe te voegen</small>
      </div>`;
    return;
  }

  const getP = c => {
    const cm = c.cardmarket?.prices;
    if (cm) return cm.avg30 ?? cm.trendPrice ?? null;
    const t = c.tcgplayer?.prices;
    if (t) { const v = t.holofoil || t.normal || Object.values(t)[0]; return v?.market ?? null; }
    return null;
  };

  const wishTotal = favList.reduce((s,c) => s + (getP(c) ?? 0), 0);
  const collTotal = favList.filter(c => state.collected[c.id]).reduce((s,c) => s + (getP(c) ?? 0), 0);
  const remaining = wishTotal - collTotal;
  const collCount = favList.filter(c => state.collected[c.id]).length;
  const pct = favList.length ? (collCount / favList.length) * 100 : 0;

  view.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Totaal wishlist</div>
        <div class="stat-value">${fmtPrice(wishTotal)}</div>
        <div class="stat-sub">${favList.length} kaarten</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Gecollect</div>
        <div class="stat-value green">${fmtPrice(collTotal)}</div>
        <div class="stat-sub">${collCount} kaarten</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Nog te halen</div>
        <div class="stat-value">${fmtPrice(remaining)}</div>
        <div class="stat-sub">${favList.length - collCount} kaarten</div>
      </div>
    </div>
    <div class="progress-label"><span>Voortgang</span><span>${collCount}/${favList.length}</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="wish-list">
      ${favList.map(card => {
        const isC = !!state.collected[card.id];
        const price = getP(card);
        const img = card.images?.small || '';
        return `
          <div class="wish-row ${isC ? 'collected' : ''}" id="wr-${card.id}">
            <button class="check-btn ${isC ? 'checked' : ''}" onclick="toggleCollected('${card.id}')">${isC ? '✓' : ''}</button>
            ${img ? `<img class="wish-thumb" src="${img}" alt="${esc(card.name)}" onclick="openModalFav('${card.id}')" />` : '<div style="width:40px;height:56px;border-radius:4px;background:rgba(255,255,255,0.04);flex-shrink:0"></div>'}
            <div class="wish-info" onclick="openModalFav('${card.id}')">
              <div class="wish-name">${esc(card.name)}</div>
              <div class="wish-meta">${esc(card.set?.name || '')} · #${esc(card.number)}${card.artist ? ` · 🎨 ${esc(card.artist)}` : ''}</div>
            </div>
            <div>
              <div class="wish-price ${price == null ? 'no-price' : ''}">${fmtPrice(price)}</div>
              ${price != null ? '<div class="wish-price-sub">30d gem.</div>' : ''}
            </div>
            <button class="remove-btn" onclick="removeFav('${card.id}')" title="Verwijder">×</button>
          </div>`;
      }).join('')}
    </div>
    <div class="wish-note">Prijzen: 30-daags gemiddelde (Cardmarket/TCGPlayer) · actueel bij bladeren</div>`;
}

function toggleCollected(cardId) {
  state.collected[cardId] = !state.collected[cardId];
  saveUserData();
  renderWishlist();
}

function removeFav(cardId) {
  delete state.favorites[cardId];
  saveUserData();
  updateFavBadge();
  renderWishlist();
}

async function openModalFav(cardId) {
  // Pull card from favorites, then open modal
  const card = state.favorites[cardId];
  if (!card) return;
  // Temporarily add to cards so openModal can find it
  if (!state.cards.find(c => c.id === cardId)) state.cards.push(card);
  await openModal(cardId);
}

// ── View switching ────────────────────────────────────────────────
function switchView(v) {
  document.getElementById('view-browse').style.display   = v === 'browse'   ? 'block' : 'none';
  document.getElementById('view-wishlist').style.display = v === 'wishlist'  ? 'block' : 'none';
  document.getElementById('tab-browse').className   = 'tab' + (v === 'browse'   ? ' active' : '');
  document.getElementById('tab-wishlist').className = 'tab' + (v === 'wishlist'  ? ' active' : '');
  if (v === 'wishlist') renderWishlist();
}

// ── Helpers ───────────────────────────────────────────────────────
function getPrice(card) {
  const cm = card?.cardmarket?.prices;
  if (cm) return cm.avg30 ?? cm.trendPrice ?? cm.averageSellPrice ?? null;
  const t = card?.tcgplayer?.prices;
  if (t) { const v = t.holofoil || t.normal || Object.values(t)[0]; return v?.market ?? v?.mid ?? null; }
  return null;
}
function fmtPrice(p) { return p != null ? '€' + Number(p).toFixed(2) : '—'; }
function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function infoRow(label, value) {
  return `<div class="info-row"><span class="info-label">${esc(label)}</span><span class="info-value">${esc(value)}</span></div>`;
}
function setLoading(on) {
  document.getElementById('spinner').style.display = on ? 'flex' : 'none';
  document.getElementById('card-grid').style.display = on ? 'none' : 'grid';
}
function showError(msg) {
  const el = document.getElementById('error-box');
  el.textContent = msg; el.style.display = 'block';
}
function clearError() {
  document.getElementById('error-box').style.display = 'none';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
init();
</script>
</body>
</html>
